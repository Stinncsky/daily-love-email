<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>每日爱情邮件 - {{ today }}</title>
    <style>
        /* Reset styles for email clients */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
        
        /* Responsive styles */
        @media only screen and (max-width: 600px) {
            .container { width: 100% !important; max-width: 100% !important; }
            .content { padding: 20px !important; }
            .greeting-text { font-size: 20px !important; }
            .days-number { font-size: 72px !important; }
            .quote-text { font-size: 16px !important; }
            .weather-temp { font-size: 20px !important; }
        }
        
        @media only screen and (max-width: 480px) {
            .days-number { font-size: 56px !important; }
            .greeting-text { font-size: 18px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background: {{ background_style|default('linear-gradient(180deg, #FAD4E4 0%, #FDF6F0 50%, #FFF8F5 100%)') }}; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh;">

    <!-- Main Container -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                
                <!-- Email Content Container -->
<table class="container" border="0" cellpadding="0" cellspacing="0" width="560" style="max-width: 560px; background: {{ card_background_style|default('rgba(255, 255, 255, 0.6)') }}; backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(184, 123, 123, 0.15);">
                    
                    <!-- Top Decoration: Heart Icon -->
                    <tr>
                        <td style="text-align: center; padding-top: 40px; padding-bottom: 10px;">
                            <span style="font-size: 48px; color: #B87B7B; line-height: 1;">♥</span>
                        </td>
                    </tr>
                    
                    <!-- Greeting Section -->
                    <tr>
                        <td class="content" style="padding: 10px 40px 20px; text-align: center;">
                            <p class="greeting-text" style="margin: 0 0 8px; color: #5C4A3D; font-size: 24px; font-weight: 500; letter-spacing: 2px;">亲爱的 {{ recipient_name }}</p>
                            <p style="margin: 0; color: #8B7355; font-size: 14px; letter-spacing: 1px;">{{ today }}</p>
                        </td>
                    </tr>
                    
                    <!-- Days Together Card (Pink Gradient) -->
                    <tr>
                        <td style="padding: 0 30px 20px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td style="background: linear-gradient(135deg, #F4C2C2 0%, #E8B4B8 100%); border-radius: 16px; padding: 35px 30px; text-align: center; box-shadow: 0 4px 15px rgba(232, 180, 184, 0.3);">
                                        <p style="margin: 0 0 15px; color: rgba(92, 74, 61, 0.8); font-size: 14px; letter-spacing: 3px; font-weight: 500;">我们已经相爱了</p>
                                        <div class="days-number" style="font-size: 88px; font-weight: 700; color: #5C4A3D; line-height: 1; margin: 0; letter-spacing: -2px; text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.3);">{{ days_together }}</div>
                                        <p style="margin: 10px 0 0; color: #5C4A3D; font-size: 18px; font-weight: 500; letter-spacing: 4px;">天</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Weather Card (Blue Gradient) -->
                    {% if weather %}
                    <tr>
                        <td style="padding: 0 30px 20px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td style="background: linear-gradient(135deg, #A8D8EA 0%, #B8E6F0 100%); border-radius: 16px; padding: 25px 30px; box-shadow: 0 4px 15px rgba(168, 216, 234, 0.3);">
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="padding-bottom: 15px; text-align: center;">
                                                    <span style="font-size: 14px; color: #5C4A3D; letter-spacing: 1px;">📍 {{ recipient_city }} 今天</span>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td style="text-align: center;">
                                                    <span style="font-size: 20px; color: #5C4A3D; margin-right: 8px;">🌡️</span>
                                                    <span class="weather-temp" style="font-size: 28px; font-weight: 700; color: #5C4A3D; letter-spacing: 1px;">{{ weather.temp_min|round|int }}° / {{ weather.temp_max|round|int }}°</span>
                                                    <span style="font-size: 16px; color: #5C4A3D; margin-left: 8px;">{{ weather.condition }}</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    {% endif %}
                    
                    <!-- Quote Card (White Semi-transparent with Quote Decoration) -->
                    <tr>
                        <td style="padding: 0 30px 30px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td style="background: rgba(255, 255, 255, 0.85); border-radius: 16px; padding: 35px 30px; box-shadow: 0 4px 20px rgba(184, 123, 123, 0.1); border: 1px solid rgba(255, 255, 255, 0.5);">
                                        <!-- Opening Quote -->
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td style="padding-bottom: 10px;">
                                                    <span style="font-size: 48px; color: #E8B4B8; line-height: 1; font-family: Georgia, serif; opacity: 0.6;">"</span>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <p class="quote-text" style="margin: 0; color: #5C4A3D; font-size: 17px; line-height: 1.9; font-style: italic; text-align: center; padding: 0 10px;">
                                                        {{ quote.content }}
                                                    </p>
                                                </td>
                                            </tr>
                                            <!-- Closing Quote -->
                                            <tr>
                                                <td style="padding-top: 10px; text-align: right;">
                                                    <span style="font-size: 48px; color: #E8B4B8; line-height: 1; font-family: Georgia, serif; opacity: 0.6;">"</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Bottom Divider -->
                    <tr>
                        <td style="padding: 0 30px 25px; text-align: center;">
                            <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                                <tr>
                                    <td style="color: #B87B7B; font-size: 14px; letter-spacing: 3px;">
                                        ─── ♥ ───
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Signature Section -->
                    <tr>
                        <td style="padding: 0 30px 40px; text-align: center;">
                            <p style="margin: 0 0 8px; color: #5C4A3D; font-size: 16px; font-weight: 500; letter-spacing: 1px;">爱你的, {{ sender_name }}</p>
                            <p style="margin: 0; color: #8B7355; font-size: 13px;">{{ today }}</p>
                        </td>
                    </tr>
                    
                </table>
                
                <!-- Spacing at bottom -->
                <table border="0" cellpadding="0" cellspacing="0" width="100%">
                    <tr><td style="height: 40px;"></td></tr>
                </table>
                
            </td>
        </tr>
    </table>

</body>
</html>

name: Daily Love Email

on:
  # 定时触发：每天 UTC 8:00 (北京时间 16:00)
  schedule:
    - cron: '0 8 * * *'
  
  # 手动触发：在 Actions 页面点击 "Run workflow"
  workflow_dispatch:
    inputs:
      dry_run:
        description: '干运行模式（不发送邮件）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  send-email:
    name: Send Daily Love Email
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Send love email
        run: python src/main.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          RECIPIENT_NAME: ${{ secrets.RECIPIENT_NAME }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          LOVE_START_DATE: ${{ secrets.LOVE_START_DATE }}
          CITY: ${{ secrets.CITY }}
          ANNIVERSARIES: ${{ secrets.ANNIVERSARIES }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CARD_BACKGROUND_TYPE: ${{ secrets.CARD_BACKGROUND_TYPE }}
          CARD_BACKGROUND_VALUE: ${{ secrets.CARD_BACKGROUND_VALUE }}
